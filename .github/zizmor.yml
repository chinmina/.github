# zizmor policy for the shared release kit.
#
# R31: every third-party action is pinned to a full commit SHA.
# R32: first-party kit references (this repo) use the moving @verified-actions
#      ref by design -- the kit's workflows and composites advance together on
#      that branch, and consumers pin to it. So first-party refs are ref-pin;
#      everything else must be hash-pin.
rules:
  unpinned-uses:
    config:
      policies:
        chinmina/*: ref-pin
        "*": hash-pin
