# Reusable goreleaser release wrapper (PRD reqs R8-R11, R15-R18, R25-R35).
#
# Serves both Go and Bun projects -- goreleaser builds either, so there is one
# wrapper, not a Go/Bun split. Triggered by the consumer on `push` of a v* tag
# (created by release-please). Runs the build -> attest -> publish gate:
#   1. goreleaser builds artifacts and fills the existing release-please draft
#      (the consumer's .goreleaser config must set release.draft: true and
#      release.mode: keep-existing / use_existing_draft).
#   2. (channel: binstaller) generate an attestable install.sh.
#   3. attest the checksummed artifacts (+ install.sh) keylessly via OIDC.
#   4. publish the release by flipping it out of draft -- last, so nothing is
#      downloadable before its provenance exists (R10).
#
# Tool versions resolve via mise (the version authority): the setup-release-
# toolchain action installs goreleaser/binstaller through mise in one cached
# pass and sets up Go and/or Bun via their setup actions, per what the repo
# declares in mise.
#
# Consumers call this at @verified-actions. On the `app` token-source with
# homebrew enabled they pass HOMEBREW_GITHUB_TOKEN via `secrets: inherit` (it is
# environment-scoped, so only the reusable workflow's env-targeting job can
# resolve it). The keyless octo-sts path needs NO secrets, so its callers omit
# `secrets:` entirely.
#
# Docker / ko image publishing: the wrapper does NOT build, sign, or push images
# and NEVER sets KO_DOCKER_REPO -- image build/sign/push stay entirely in the
# consumer's goreleaser (ko + cosign) config, which also selects the target
# repository (e.g. DockerHub vs the ttl.sh ephemeral store, keyed off CI). The
# wrapper only offers (a) an optional Docker Hub login before the build and (b)
# `extra-mise-tools` so signing CLIs like cosign reach PATH. A ko+cosign
# consumer therefore: declares `cosign` in mise.toml, passes
# `extra-mise-tools: cosign`, and configures the `release` environment with the
# DOCKERHUB_USER variable and the DOCKERHUB_TOKEN secret (the latter delivered
# via `secrets: inherit`). The wrapper reads the username from vars.DOCKERHUB_USER
# directly -- the release job targets the caller's `release` environment, so both
# the variable and the secret resolve there.
# Login defaults ON ("login unless opted out"): a consumer that does NOT publish
# an image MUST opt out with `disable-docker-login: true`. Leaving login on
# without a DOCKERHUB_USER variable is a misconfiguration the job rejects up front
# (see the "Validate docker login inputs" step) rather than skipping silently
# and failing opaquely later in goreleaser's push.

name: Release

on:
  workflow_call:
    secrets:
      # App-path + homebrew only. ENVIRONMENT-scoped to `release` and consumed by
      # the release job below (which runs in that environment). A reusable-
      # workflow CALL job cannot hold an `environment:`, so a narrowed caller
      # `secrets:` map would resolve EMPTY; the caller therefore delivers it with
      # `secrets: inherit` and marks that line `# zizmor: ignore[secrets-inherit]`
      # so the broad pass is clearly intended. The octo-sts path is keyless (it
      # mints the tap token) and passes nothing.
      HOMEBREW_GITHUB_TOKEN:
        description: >-
          Homebrew tap write token. Required only for token-source "app" with
          homebrew enabled; consumed by the release job in the `release`
          environment. The octo-sts path mints the tap token instead.
        required: false
      # Container-registry (Docker Hub) password/token. Same delivery model as
      # HOMEBREW_GITHUB_TOKEN: ENVIRONMENT-scoped to `release`, so a narrowed
      # caller `secrets:` map would resolve EMPTY -- the caller delivers it with
      # `secrets: inherit`. Its paired username is the release-environment
      # variable DOCKERHUB_USER (read via the vars context, no inherit needed).
      # Only used by the login step below, gated on `disable-docker-login`.
      DOCKERHUB_TOKEN:
        description: >-
          Container-registry (Docker Hub) password or access token. Required
          when Docker login is enabled (the default); paired with the
          DOCKERHUB_USER variable and consumed by the login step in the
          `release` environment.
        required: false
    inputs:
      pre-build:
        description: >-
          Optional shell run after tool setup and before goreleaser (R15). The
          preferred place for codegen is goreleaser global before.hooks; this is
          the fallback for anything goreleaser cannot cover.
        required: false
        type: string
        default: ""
      disable-binstaller:
        description: Skip generating/attaching the binstaller install.sh (R13).
        required: false
        type: boolean
        default: false
      disable-homebrew:
        description: Skip homebrew publication (R13). Homebrew lives in goreleaser.
        required: false
        type: boolean
        default: false
      binstaller-spec:
        description: Path to the committed binstaller spec.
        required: false
        type: string
        default: .config/binstaller.yml
      token-source:
        description: >-
          Write-token source for the release job. "app" (default) uses
          github.token (and secrets.HOMEBREW_GITHUB_TOKEN for the tap).
          "octo-sts" mints keyless OIDC tokens against the centralised org
          trust policies instead (no stored tap PAT).
        required: false
        type: string
        default: app
      sts-scope:
        description: >-
          octo-sts scope (org or org/repo) whose central trust policies are
          consulted. octo-sts only; defaults to the repository owner.
        required: false
        type: string
        default: ""
      sts-release-identity:
        description: >-
          octo-sts identity for the app-repo release token (contents:write).
          octo-sts only; defaults to "release-<repo>".
        required: false
        type: string
        default: ""
      sts-tap-identity:
        description: >-
          octo-sts identity for the shared Homebrew tap token (contents:write on
          the tap). octo-sts + homebrew only; defaults to "release-tap".
        required: false
        type: string
        default: release-tap
      disable-npm:
        description: >-
          Skip npm publication (R31). Defaults to true — consumers opt in
          explicitly. When false, npm-package-name is required.
        required: false
        type: boolean
        default: true
      npm-package-name:
        description: >-
          npm package name for the main shim (e.g. @jamestelfer/sandy). Platform
          packages are named by appending -{os}-{cpu}. Required when disable-npm
          is false.
        required: false
        type: string
        default: ""
      npm-main-package-dir:
        description: >-
          Path to the main shim package directory in the consumer repo. Must
          contain a package.json with version set to 0.0.0-dev.
        required: false
        type: string
        default: .github/workflows/npm/main
      extra-mise-tools:
        description: >-
          Additional whitespace-separated tool NAMES (e.g. "cosign") to install
          via mise for the release job, appended to the built-in set
          (goreleaser[, binstaller]). Names only: the version is taken from the
          consumer's mise.toml, which is the sole version authority -- a
          `name@version` here will FAIL the toolchain check. Each name must be
          declared in mise.toml (pinned + trusted) AND listed here (explicitly
          installed for release); declaration alone does not install it. Use
          this to put signing CLIs like cosign on PATH for goreleaser's ko /
          docker signing.
        required: false
        type: string
        default: ""
      disable-docker-login:
        description: >-
          Opt out of the container-registry (Docker Hub) login step. Login
          defaults ON, so projects that publish NO container image must set
          this true. When false (default), the release environment must define
          the DOCKERHUB_USER variable (and DOCKERHUB_TOKEN secret); the job
          fails fast if DOCKERHUB_USER is missing.
        required: false
        type: boolean
        default: false

# No workflow-level GITHUB_TOKEN scope: the release job declares exactly the
# scopes it needs.
permissions: {}

jobs:
  release:
    name: Build, attest & publish
    runs-on: ubuntu-latest
    environment: release # R35
    permissions:
      contents: write # fill + publish the release, push assets
      id-token: write # R30: keyless attestation OIDC
      attestations: write # R29: record attestations
    env:
      TAG: ${{ github.ref_name }}
    # Strict bash for every run step (GHA's `bash` keyword gives -e + pipefail
    # but not -u; this is that same definition plus nounset), defined once.
    defaults:
      run:
        shell: bash --noprofile --norc -euo pipefail {0}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # goreleaser needs full history + tags
          persist-credentials: false # goreleaser/gh use GITHUB_TOKEN env, not git creds

      # Fail fast on Docker misconfiguration, before any toolchain install or
      # build work. Login is on by default, so a consumer that has not opted out
      # MUST define the DOCKERHUB_USER variable in the release environment.
      # Skipping silently would let the release run unauthenticated and fail
      # opaquely later in goreleaser's ko push; projects that publish no image
      # pass disable-docker-login: true instead.
      - name: Validate docker login inputs
        if: ${{ !inputs.disable-docker-login && vars.DOCKERHUB_USER == '' }}
        run: |
          echo "::error::Docker login is enabled but the DOCKERHUB_USER variable is not set in the release environment. Define it (alongside the DOCKERHUB_TOKEN secret), or pass disable-docker-login: true if this project publishes no container image."
          exit 1

      # One upfront toolchain install: the mise CLIs the enabled channels need
      # (goreleaser, plus binstaller when its channel is on) in a single cached
      # pass. Go and/or Bun are set up via their setup actions from whatever the
      # repo declares in mise. Fails here, naming the tool, if a requested CLI is
      # undeclared in mise.
      - name: Set up release toolchain
        uses: chinmina/.github/.github/actions/setup-release-toolchain@verified-actions
        with:
          mise-tools: goreleaser ${{ inputs.disable-binstaller && '' || 'binstaller' }} ${{ inputs.extra-mise-tools }}

      # The hook is consumer-provided shell. Pass it through env and execute at
      # runtime (never expand it into the script text) to avoid template injection.
      - name: Pre-build
        if: ${{ inputs.pre-build != '' }}
        env:
          PRE_BUILD: ${{ inputs.pre-build }}
        run: bash -c "$PRE_BUILD"

      # octo-sts path: mint a contents:write token for THIS repo's release
      # (subject is env-qualified to `release`; the central policy pins the v*
      # tag ref). The app path uses github.token, so this is skipped there.
      - name: Mint release token (octo-sts)
        id: release-token
        if: ${{ inputs.token-source == 'octo-sts' }}
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: ${{ inputs.sts-scope != '' && inputs.sts-scope || github.repository_owner }}
          identity: ${{ inputs.sts-release-identity != '' && inputs.sts-release-identity || format('release-{0}', github.event.repository.name) }}

      # octo-sts path: mint a contents:write token for the SHARED Homebrew tap,
      # only when homebrew is on. Keyless — replaces a stored tap PAT.
      - name: Mint tap token (octo-sts)
        id: tap-token
        if: ${{ inputs.token-source == 'octo-sts' && !inputs.disable-homebrew }}
        uses: octo-sts/action@f603d3be9d8dd9871a265776e625a27b00effe05 # v1.1.1
        with:
          scope: ${{ inputs.sts-scope != '' && inputs.sts-scope || github.repository_owner }}
          identity: ${{ inputs.sts-tap-identity }}

      # release.draft and release.use_existing_draft must both be set so
      # goreleaser fills release-please's existing draft instead of creating a
      # second release.
      - name: Require use_existing_draft in the goreleaser config
        run: |
          config=""
          for candidate in .config/goreleaser.yml .config/goreleaser.yaml .goreleaser.yml .goreleaser.yaml goreleaser.yml goreleaser.yaml; do
            if [[ -f "${candidate}" ]]; then
              config="${candidate}"
              break
            fi
          done
          if [[ -z "${config}" ]]; then
            echo "::error::No goreleaser config found. Add one that sets release.draft: true and release.use_existing_draft: true."
            exit 1
          fi
          if [[ "$(yq '(.release.draft == true) and (.release.use_existing_draft == true)' "${config}")" != "true" ]]; then
            echo "::error::${config} must set release.draft: true and release.use_existing_draft: true. Both are required so the release-please draft is reused instead of a second release being created."
            exit 1
          fi
          echo "Confirmed ${config} sets release.draft and release.use_existing_draft."

      # R31: when npm is on, validate required inputs before goreleaser runs so
      # misconfiguration fails fast rather than after a full build.
      - name: Validate npm inputs
        if: ${{ !inputs.disable-npm }}
        env:
          NPM_PACKAGE_NAME: ${{ inputs.npm-package-name }}
          NPM_MAIN_PACKAGE_DIR: ${{ inputs.npm-main-package-dir }}
        run: |
          if [[ -z "$NPM_PACKAGE_NAME" ]]; then
            echo "::error::npm-package-name is required when disable-npm is false."
            exit 1
          fi
          if [[ ! -d "$NPM_MAIN_PACKAGE_DIR" ]]; then
            echo "::error::npm-main-package-dir '${NPM_MAIN_PACKAGE_DIR}' not found. Create it or set disable-npm: true."
            exit 1
          fi
          if [[ ! -f "${NPM_MAIN_PACKAGE_DIR}/package.json" ]]; then
            echo "::error::${NPM_MAIN_PACKAGE_DIR}/package.json not found."
            exit 1
          fi
          if ! mise ls --current --json | jq -e 'has("node")' >/dev/null; then
            echo "::error::npm channel requires 'node' declared in mise.toml."
            exit 1
          fi
          echo "npm inputs validated: package=${NPM_PACKAGE_NAME}, main-dir=${NPM_MAIN_PACKAGE_DIR}"

      # Registry auth for the ko / docker publishing done INSIDE goreleaser.
      # Enabled by default; the "Validate docker login inputs" step above has
      # already guaranteed DOCKERHUB_USER is set unless login was opted out, so
      # this runs whenever login is on. Username + token both resolve from the
      # caller's `release` environment (vars + secrets). No `registry:` ->
      # defaults to Docker Hub (the ttl.sh ephemeral store needs no auth). The
      # wrapper does NOT manage KO_DOCKER_REPO -- the consumer's goreleaser
      # config selects the image repository. Placed after the octo-sts mint
      # steps and before the build so ordering is stable.
      - name: Log in to container registry
        if: ${{ !inputs.disable-docker-login }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ vars.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # R8 (build): goreleaser fills the existing release-please draft. The tap
      # token writes the formula to the shared tap; the cask/brew itself is
      # configured in goreleaser (R16).
      - name: Build (goreleaser)
        env:
          GITHUB_TOKEN: ${{ inputs.token-source == 'octo-sts' && steps.release-token.outputs.token || github.token }}
          HOMEBREW_GITHUB_TOKEN: ${{ inputs.disable-homebrew && '' || (inputs.token-source == 'octo-sts' && steps.tap-token.outputs.token || secrets.HOMEBREW_GITHUB_TOKEN) }}
        run: goreleaser release --clean

      # Channel: binstaller. Generate install.sh (attested below, published with
      # the release). binst is already on PATH from the upfront toolchain step.
      - name: Generate install script
        if: ${{ !inputs.disable-binstaller }}
        uses: chinmina/.github/.github/actions/binstaller-install-script@verified-actions
        with:
          spec: ${{ inputs.binstaller-spec }}
          version: ${{ env.TAG }}

      # R8/R9/R28: attest the checksummed artifacts (each archive individually)
      # and install.sh, BEFORE publishing. Single pass, both subjects.
      - name: Attest artifacts
        uses: chinmina/.github/.github/actions/attest-artifacts@verified-actions
        with:
          checksums-file: dist/checksums.txt
          extra-subject-path: ${{ inputs.disable-binstaller && '' || 'install.sh' }}

      # R31/R32/R33: publish npm packages via OIDC trusted publishing (no stored
      # token). Runs after goreleaser (dist/ exists) and after attestation, but
      # before the GitHub release is published — so npm and GitHub provenance
      # both exist before any artifact is publicly downloadable (R10).
      - name: Publish npm packages
        if: ${{ !inputs.disable-npm }}
        uses: chinmina/.github/.github/actions/npm-publish@verified-actions
        with:
          package-name: ${{ inputs.npm-package-name }}
          main-package-dir: ${{ inputs.npm-main-package-dir }}
          version: ${{ env.TAG }}

      # R8 (publish) / R9 / R10 / R17: flip out of draft LAST. A semver
      # pre-release tag (v1.2.3-rc.1) is marked prerelease; otherwise latest.
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "$TAG" == *-* ]]; then
            echo "Pre-release tag ${TAG}: publishing as prerelease"
            gh release edit "$TAG" --draft=false --prerelease
          else
            echo "Release tag ${TAG}: publishing as latest"
            gh release edit "$TAG" --draft=false --latest
          fi
