name: Generate binstaller install script
description: >-
  Generate an attestable install.sh from the committed binstaller spec with the
  current release's checksums embedded, and upload it to the GitHub release. The
  committed spec is never modified: checksums are embedded into a working copy
  only, so `git status` stays clean after a run.

  Requires the `binst` CLI on PATH (include `binstaller` in setup-release-
  toolchain's mise-tools in the calling job first).

inputs:
  spec:
    description: Path to the committed binstaller spec.
    required: false
    default: .config/binstaller.yml
  version:
    description: Release tag whose checksums to embed and to upload to (e.g. v1.2.3).
    required: true
  checksums-file:
    description: Goreleaser checksums file to source per-artifact checksums from.
    required: false
    default: dist/checksums.txt
  output:
    description: Path to write the generated install script.
    required: false
    default: install.sh
  upload:
    description: Upload the generated install script to the release as an asset.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Generate install script
      shell: bash --noprofile --norc -euo pipefail {0}
      env:
        SPEC: ${{ inputs.spec }}
        VERSION: ${{ inputs.version }}
        CHECKSUMS_FILE: ${{ inputs.checksums-file }}
        OUTPUT: ${{ inputs.output }}
        UPLOAD: ${{ inputs.upload }}
        GH_TOKEN: ${{ github.token }}
      run: |
        # R27: fail before generating anything if the spec is missing or empty.
        if [[ ! -s "$SPEC" ]]; then
          echo "::error title=binstaller-install-script::binstaller spec '${SPEC}' is missing or empty." >&2
          exit 1
        fi

        # R26: embed checksums into a working copy only, leaving the committed
        # spec untouched (keeps `git status` clean after the run).
        work_spec="$(mktemp --suffix=.binstaller.yml)"
        cp "$SPEC" "$work_spec"

        echo "Embedding checksums from ${CHECKSUMS_FILE} into working copy"
        binst embed-checksums \
          --config "$work_spec" \
          --version "$VERSION" \
          --mode checksum-file \
          --file "$CHECKSUMS_FILE"

        echo "Generating ${OUTPUT} from working copy of spec"
        binst gen --config "$work_spec" -o "$OUTPUT"

        if [[ ! -s "$OUTPUT" ]]; then
          echo "::error title=binstaller-install-script::binst produced no install script at '${OUTPUT}'." >&2
          exit 1
        fi

        if [[ "$UPLOAD" == "true" ]]; then
          echo "Uploading ${OUTPUT} to release ${VERSION}"
          gh release upload "$VERSION" "$OUTPUT" --clobber
        fi
