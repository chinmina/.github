name: Publish npm packages
description: >-
  Publish platform-specific and main npm packages using OIDC trusted publishing
  (no stored token). Reads goreleaser's dist/artifacts.json to discover archives,
  platforms, and binary names — no repetition of goreleaser configuration needed.
  Generates minimal platform package.json files and derives the main package
  from the consumer's package.json; the platform-selecting launcher is hosted
  here and copied in, so consumers ship no launcher.

  The action pins its own Node 24 + Bun toolchain for generation/publishing,
  independent of the consumer build toolchain.

  npm provenance is produced automatically under trusted publishing. Do NOT set
  NODE_AUTH_TOKEN — credentials are supplied via the OIDC token.

  Requires `id-token: write` on the calling job (already present for
  attestation).

inputs:
  package-name:
    description: >-
      npm package name for the main shim (e.g. @jamestelfer/sandy). Platform
      packages are named by appending -{os}-{cpu} (e.g.
      @jamestelfer/sandy-linux-x64).
    required: true
  artifacts-json:
    description: Path to goreleaser's artifacts.json output.
    required: false
    default: dist/artifacts.json
  main-package-dir:
    description: >-
      Path to the main package directory (relative to repo root). Must contain a
      package.json with a non-empty name. version, repository, bin,
      optionalDependencies and the chinmina launcher map are derived by the
      action; files is unioned and engines set when absent. No launcher needed.
    required: false
    default: .github/workflows/npm/main
  readme:
    description: Path to the README to copy into the main package before publishing.
    required: false
    default: README.md
  version:
    description: Release tag (e.g. v1.2.3). Leading v is stripped internally.
    required: true

runs:
  using: composite
  steps:
    # This action pins its OWN toolchain (Node 24 + Bun latest) for generation
    # and publishing, independent of the consumer's mise config: the versions
    # used to build/publish the npm package need not match the project's build
    # toolchain. setup-node also writes the registry endpoint into .npmrc for
    # trusted publishing. Node 24 ships an npm new enough for OIDC.
    - name: Set up Node for npm publish
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: "24"
        registry-url: https://registry.npmjs.org

    # Bun runs the TypeScript generation/orchestration (publish.ts). It packs
    # each tarball directory; the actual publish is `npm publish` because npm
    # OIDC trusted publishing (provenance, no stored token) is an npm-CLI
    # feature — Bun never publishes.
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version: latest

    # Install the action's own dependencies (zod) from the committed lockfile.
    - name: Install action dependencies
      shell: bash --noprofile --norc -euo pipefail {0}
      working-directory: ${{ github.action_path }}
      run: bun install --frozen-lockfile

    # Ensure npm supports OIDC trusted publishing (npm ≥ 11.5.1). Node 24 ships
    # a recent npm, but upgrade unconditionally to stay ahead of runner drift.
    - name: Ensure npm supports trusted publishing
      shell: bash --noprofile --norc -euo pipefail {0}
      run: npm install -g npm@latest

    # publish.ts validates ALL consumer input up front (fail-fast, before the
    # first publish), then publishes each platform package and the main shim.
    # All inputs flow through env — never template-expanded into script text —
    # to avoid injection from consumer-supplied values.
    - name: Publish npm packages
      shell: bash --noprofile --norc -euo pipefail {0}
      env:
        ACTION_PATH: ${{ github.action_path }}
        PACKAGE_NAME: ${{ inputs.package-name }}
        ARTIFACTS_JSON: ${{ inputs.artifacts-json }}
        MAIN_PACKAGE_DIR: ${{ inputs.main-package-dir }}
        README: ${{ inputs.readme }}
        VERSION: ${{ inputs.version }}
        # NODE_AUTH_TOKEN is intentionally absent: trusted publishing supplies
        # credentials via the OIDC token exchanged by npm itself.
      run: bun run "${ACTION_PATH}/src/publish.ts"
