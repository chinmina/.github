# Lives at: <org>/.github/.github/chainguard/release-please-relic.sts.yaml
# (CENTRALISED — NOT in the relic repo; added via a reviewed PR to <org>/.github.)
#
# Consulted when relic's release-please job mints a token: octo-sts scope is the
# `<org>` org (default), identity is `release-please-relic` (auto-derived
# by release-please.yml as release-please-<repo>).
issuer: https://token.actions.githubusercontent.com
subject: repo:<org>/relic:environment:automation
claim_pattern:
  ref: 'refs/heads/main'

permissions:
  contents: write
  pull_requests: write

repositories:
  - relic
