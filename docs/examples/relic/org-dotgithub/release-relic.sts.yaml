# Lives at: <org>/.github/.github/chainguard/release-relic.sts.yaml
# (CENTRALISED — NOT in the relic repo; added via a reviewed PR to <org>/.github.)
#
# Consulted when relic's goreleaser-release.yml release job mints its app-repo write
# token: scope = `<org>` org, identity = `release-relic` (auto-derived as
# release-<repo>). Release environment, v* tag only. Excludes the tap.
issuer: https://token.actions.githubusercontent.com
subject: repo:<org>/relic:environment:release
claim_pattern:
  ref: '^refs/tags/v.*$'

permissions:
  contents: write

repositories:
  - relic
