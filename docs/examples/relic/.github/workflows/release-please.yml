# <org>/relic — release-please trigger (keyless octo-sts path).
name: release-please

on:
  push:
    branches: [main]

# Caller permissions are a CEILING: a reusable workflow can only downgrade the
# GITHUB_TOKEN, never elevate it. So the caller must grant at least what the
# reusable workflow's job declares — `permissions: {}` here would starve the
# octo-sts OIDC mint (no id-token: write) and the pipeline dies on its first step.
permissions:
  contents: read
  id-token: write # required for the octo-sts OIDC token exchange

jobs:
  release-please:
    uses: chinmina/.github/.github/workflows/release-please.yml@verified-actions # zizmor: ignore[secrets-inherit]
    with:
      token-source: octo-sts
    # secrets: inherit is intentional — environment-scoped secrets must resolve
    # inside the reusable workflow's environment-targeting job.
    secrets: inherit
