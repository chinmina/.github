# <org>/relic — build/attest/publish on the v* tag pushed by release-please.
# Filename kept as release.yml so a later npm opt-in needs no rename
# (npm trusted publishing validates the caller workflow filename).
name: release

on:
  push:
    tags: ["v*"]

# Default-deny at the workflow level; the GITHUB_TOKEN ceiling is granted on the
# calling job below (secure by default — no other job could ever see it).
permissions: {}

jobs:
  release:
    # Caller permissions are a CEILING: a reusable workflow can only downgrade
    # the GITHUB_TOKEN, never elevate it. Grant at least what
    # goreleaser-release.yml's job declares; omitting this would starve the
    # octo-sts OIDC mint and the keyless attestation.
    permissions:
      contents: write # fill + publish the release, push assets
      id-token: write # octo-sts OIDC mint + keyless attestation
      attestations: write # record build attestations
    uses: chinmina/.github/.github/workflows/goreleaser-release.yml@verified-actions
    with:
      # Keyless: mint the release-relic token (and release-tap when homebrew is
      # on) against the centralised org policies instead of github.token/a PAT.
      token-source: octo-sts
      # GH release + binstaller on (defaults). relic ships no formula yet; flip
      # disable-homebrew off to start using the (already-provisioned) release-tap
      # mint + tap policy.
      disable-homebrew: true
      # relic ships no container image; Docker/ko login defaults ON and fails
      # fast without a DOCKERHUB_USER variable, so opt out explicitly. To start
      # publishing an image: drop this, set DOCKERHUB_USER + DOCKERHUB_TOKEN in
      # the release environment, and pass extra-mise-tools: cosign.
      disable-docker-login: true
      # relic ships no npm package. npm publication defaults ON and fails fast
      # without npm-package-name, so opt out explicitly. To start publishing to
      # npm: drop this, set npm-package-name, and commit a main package dir.
      disable-npm: true
      # templ codegen runs in goreleaser before.hooks, so no pre-build needed.
    # No `secrets:` block: the octo-sts path is keyless. (On the `app` path with
    # homebrew you would add `secrets: inherit` so the environment-scoped
    # HOMEBREW_GITHUB_TOKEN resolves inside the reusable workflow's job.)
